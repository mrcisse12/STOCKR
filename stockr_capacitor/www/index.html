<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Stockr</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800;9..144,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        #app {
            max-width: 430px;
            width: 100%;
            height: 100vh;
            max-height: 932px;
            background: #FFF8F0;
            border-radius: 44px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 8px #2c2c2c, 0 0 0 12px #1a1a1a;
            display: flex;
            flex-direction: column;
        }
        
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 70px;
        }
        
        .app-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .tabs {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 3px solid #F4B400;
            display: flex;
            padding: 8px 16px 20px;
            justify-content: space-around;
            z-index: 100;
        }
        
        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            padding: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #6C6C6C;
            cursor: pointer;
            border-radius: 12px;
        }
        
        .tab.active {
            color: #1B7A6F;
            border-top: 3px solid #1B7A6F;
            padding-top: 5px;
        }
        
        .tab-icon {
            font-size: 24px;
        }
        
        @media (max-width: 430px) {
            #app {
                border-radius: 0;
                max-width: 100%;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-content" id="app-content"></div>
        <div class="tabs" id="tabs"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
