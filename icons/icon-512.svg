<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="BARO">
  <!-- Fond bleu clair -->
  <rect width="512" height="512" fill="#BFE4F7"/>
  <!-- Hexagone fin intérieur (ombre 3D) -->
  <g fill="none" stroke="#141062" stroke-width="26" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="256,68 430,168 430,344 256,444 82,344 82,168"/>
  </g>
  <!-- B stylisé — courbes nettes, deux bulles, barre verticale -->
  <g fill="#1E1B80">
    <!-- barre verticale gauche -->
    <rect x="168" y="160" width="52" height="192" rx="6"/>
    <!-- bulle supérieure -->
    <path d="M220 160 h72 a62 62 0 0 1 62 62 v4 a62 62 0 0 1 -62 62 h-72 z"/>
    <!-- espace inter-bulle -->
    <!-- bulle inférieure -->
    <path d="M220 286 h84 a68 68 0 0 1 68 66 v0 a68 68 0 0 1 -68 66 h-84 z"/>
  </g>
  <!-- Évidements (creux des bulles pour contraste 3D) -->
  <g fill="#BFE4F7">
    <path d="M248 198 h44 a28 28 0 0 1 28 28 v0 a28 28 0 0 1 -28 28 h-44 z"/>
    <path d="M248 318 h56 a32 32 0 0 1 32 32 v0 a32 32 0 0 1 -32 32 h-56 z"/>
  </g>
  <!-- Texte BARO -->
  <text x="256" y="478" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="900" fill="#1E1B80" letter-spacing="4">BARO</text>
</svg>
